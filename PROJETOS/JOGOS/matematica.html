<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Somar e Subtrair até 10</title>

<style>
  :root{
    --bg:#f6f7fb;
    --card:#fff;
    --text:#111827;
    --muted:#6b7280;
    --ok:#16a34a;
    --bad:#dc2626;
    --blue:#2563eb;
    --shadow:0 10px 30px rgba(0,0,0,.10);
    --radius:16px;

    /* tamanhos base (desktop) */
    --dot: 18px;
    --dotGap: 8px;

    --stageMinH: 120px;
    --zoneMinH: 92px;

    --titleSize: 18px;
    --questionSize: 38px;

    --btnPadY: 14px;
    --btnFont: 18px;

    --avatar: 190px;
    --face: 135px;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: radial-gradient(circle at 20% 10%, #dbeafe 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, #fce7f3 0%, transparent 45%),
                var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
  }

  .app{
    width:min(940px, 100%);
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  header{
    padding:16px 18px;
    border-bottom:1px solid #eef2ff;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }
  header h1{ margin:0; font-size:var(--titleSize); }
  header p{ margin:4px 0 0 0; color:var(--muted); font-size:13px; }

  .btn{
    border:none;
    border-radius:12px;
    padding:10px 12px;
    font-weight:900;
    cursor:pointer;
    user-select:none;
    transition:.12s transform, .12s opacity;
  }
  .btn:active{ transform:scale(.98); }
  .btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

  .btn-reset{ background:#e5e7eb; color:#111827; }
  .btn-hint{ background:#111827; color:#fff; }
  .btn-next{ background:var(--blue); color:#fff; }

  .content{
    display:grid;
    grid-template-columns: 1fr;
    gap:16px;
    padding:18px;
  }
  @media (min-width: 920px){
    .content{ grid-template-columns: 1.15fr .85fr; }
  }

  .card{
    border:1px solid #eef2ff;
    border-radius:var(--radius);
    padding:16px;
  }

  /* ===== ZONAS SUPERIORES ===== */
  .zones{
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    gap:12px;
    align-items:start;
    margin-bottom:12px;
  }

  .zone{
    background:#f8fafc;
    border:1px dashed #cbd5e1;
    border-radius:14px;
    padding:12px;
    min-height:var(--zoneMinH);
    position:relative;
  }

  .zoneTitle{
    position:absolute;
    top:8px;
    left:10px;
    font-size:12px;
    font-weight:900;
    color:#94a3b8;
    user-select:none;
  }

  .dots{
    margin-top:18px;
    display:flex;
    flex-wrap:wrap;
    gap:var(--dotGap);
    align-content:flex-start;
    min-height:56px;
  }

  .opBadge{
    font-size:30px;
    font-weight:900;
    width:60px;
    height:60px;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid #e5e7eb;
    background:#fff;
    user-select:none;
  }

  /* ===== PALCO (retângulo único) ===== */
  .stage{
    background:#ffffff;
    border:2px solid #e5e7eb;
    border-radius:14px;
    padding:12px;
    min-height:var(--stageMinH);
    position:relative;
    overflow:hidden;
    margin-bottom:12px;
  }
  .stageTitle{
    position:absolute;
    top:8px;
    left:10px;
    font-size:12px;
    font-weight:900;
    color:#64748b;
    user-select:none;
  }
  .stageInner{
    position:relative;
    margin-top:22px;
    min-height:80px;
  }

  /* DOTS (originais nas zonas) */
  .dot{
    width:var(--dot);
    height:var(--dot);
    border-radius:999px;
    background:#111827;
    opacity:.92;
  }
  .dot.red{ background:#dc2626; }

  /* DOTS FIXOS NO PALCO */
  .stageDot{
    position:absolute;
    width:var(--dot);
    height:var(--dot);
    border-radius:999px;
    background:#111827;
    opacity:.95;
    transition: transform .2s ease, opacity .2s ease;
  }
  .stageDot.red{ background:#dc2626; }

  /* ===== Contagem (pulso) ===== */
  .stageDot.pulse{
    transform: scale(1.6);
  }

  /* ===== PERGUNTA ===== */
  .question{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    border:1px solid #eef2ff;
    border-radius:14px;
    padding:12px;
    margin-bottom:12px;
  }
  .big{
    font-size:var(--questionSize);
    font-weight:900;
    letter-spacing:.5px;
  }

  /* ===== BOTÕES 0..10 ===== */
  .buttons{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap:10px;
  }
  .buttons button{
    padding: var(--btnPadY) 0;
    font-size: var(--btnFont);
    font-weight:900;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#e5e7eb;
    transition:.12s transform, .12s opacity;
    user-select:none;
  }
  .buttons button:hover{ transform:scale(1.03); }
  .buttons button:active{ transform:scale(.98); }
  .buttons button:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

  .msg{
    margin-top:10px;
    min-height:22px;
    text-align:center;
    font-size:16px;
    font-weight:900;
  }
  .msg.ok{ color:var(--ok); }
  .msg.bad{ color:var(--bad); }

  .controls{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:10px;
    flex-wrap:wrap;
  }

  .hintText{
    margin-top:6px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
    min-height:18px;
  }

  .stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
    color:var(--muted);
    font-size:14px;
    justify-content:center;
  }
  .pill{
    background:#f3f4f6;
    border:1px solid #e5e7eb;
    padding:8px 10px;
    border-radius:999px;
  }

  /* ===== PERSONAGEM ===== */
  .buddy{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    text-align:center;
  }

  .avatar{
    width:var(--avatar);
    height:var(--avatar);
    border-radius:999px;
    background: linear-gradient(135deg, #fde68a, #fca5a5);
    display:flex;
    align-items:center;
    justify-content:center;
    border: 8px solid #fff;
    box-shadow: 0 12px 30px rgba(0,0,0,.12);
  }

  .face{
    width:var(--face);
    height:var(--face);
    border-radius:999px;
    background:#fff;
    position:relative;
  }

  .eye{
    width:16px; height:16px;
    background:#111827;
    border-radius:999px;
    position:absolute;
    top:48px;
  }
  .eye.left{ left:38px; }
  .eye.right{ right:38px; }

  .mouth{
    width:70px;
    height:36px;
    border:6px solid #111827;
    border-top:none;
    border-left:none;
    border-right:none;
    border-radius:0 0 60px 60px;
    position:absolute;
    top:78px;
    left:50%;
    transform:translateX(-50%);
    transition:.2s;
  }
  .happy .mouth{ transform: translateX(-50%) translateY(6px); }
  .sad .mouth{
    border-top:6px solid #111827;
    border-bottom:none;
    border-radius:60px 60px 0 0;
    transform: translateX(-50%) translateY(18px);
    height: 30px;
  }
  .neutral .mouth{
    height:0px;
    border:none;
    border-top:6px solid #111827;
    border-radius:999px;
    top:98px;
    transform:translateX(-50%);
  }

  /* ===== OVERLAY DE ANIMAÇÃO (ghosts) ===== */
  #animLayer{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:9999;
  }
  .ghost{
    position:absolute;
    width:var(--dot);
    height:var(--dot);
    border-radius:999px;
    background:#111827;
    opacity:.95;
    transition: transform .55s ease, opacity .25s ease;
    will-change: transform, opacity;
  }
  .ghost.red{ background:#dc2626; }

  /* ============================
     MODO CELULAR (sem rolagem)
     ============================ */
  @media (max-width: 600px){
    :root{
      --dot: 14px;
      --dotGap: 6px;

      --stageMinH: 92px;
      --zoneMinH: 74px;

      --titleSize: 15px;
      --questionSize: 26px;

      --btnPadY: 10px;
      --btnFont: 16px;

      --avatar: 120px;
      --face: 90px;
    }

    body{
      padding:10px;
      /* melhor para mobile (barra do navegador) */
      min-height: 100dvh;
      align-items:stretch;
    }

    .app{
      width:100%;
      /* trava na altura visível */
      max-height: calc(100dvh - 20px);
      display:flex;
      flex-direction:column;
    }

    header{
      padding:10px 12px;
      gap:8px;
    }
    header p{
      display:none; /* ganha espaço no topo */
    }
    .btn{
      padding:8px 10px;
      border-radius:10px;
    }

    .content{
      padding:10px;
      gap:10px;
      /* evita rolagem */
      overflow:hidden;
      flex:1;
    }

    .card{
      padding:10px;
    }

    /* deixa o jogo e o personagem mais “compactos” */
    .zones{
      gap:8px;
      margin-bottom:8px;
    }
    .zone{
      padding:10px;
    }
    .zoneTitle, .stageTitle{
      font-size:11px;
      top:6px;
    }
    .dots{
      margin-top:16px;
      min-height:44px;
    }

    .opBadge{
      width:44px;
      height:44px;
      border-radius:14px;
      font-size:26px;
    }

    .stage{
      padding:10px;
      margin-bottom:8px;
    }
    .stageInner{
      margin-top:18px;
      min-height:60px;
    }

    .question{
      padding:8px;
      margin-bottom:8px;
    }

    .buttons{
      gap:8px;
    }
    .buttons button{
      border-radius:10px;
    }

    .controls{
      margin-top:8px;
      gap:8px;
    }

    .msg{
      margin-top:6px;
      font-size:14px;
      min-height:18px;
    }
    .hintText{
      font-size:12px;
      min-height:16px;
      margin-top:4px;
    }

    .stats{
      font-size:12px;
      gap:6px;
      margin-top:6px;
    }
    .pill{
      padding:6px 8px;
    }

    /* personagem compactado */
    .buddy{
      gap:6px;
    }
    .avatar{
      border-width:6px;
      box-shadow: 0 10px 22px rgba(0,0,0,.10);
    }
    .eye{
      width:12px; height:12px;
      top:32px;
    }
    .eye.left{ left:26px; }
    .eye.right{ right:26px; }
    .mouth{
      width:52px;
      border-width:5px;
      top:56px;
      height:28px;
    }
    .neutral .mouth{
      top:64px;
      border-top-width:5px;
    }
    .sad .mouth{
      top:56px;
      height:24px;
      border-top-width:5px;
    }
  }
</style>
</head>

<body>
  <div class="app">
    <header>
      <div>
        <h1>Somar e Subtrair até 10</h1>
        <p>Dica: o resultado aparece em grupos de 3 e depois a contagem anima.</p>
      </div>
      <button class="btn btn-reset" id="btnReset" type="button">Zerar</button>
    </header>

    <div class="content">
      <!-- JOGO -->
      <div class="card">
        <div class="zones">
          <div class="zone" id="zoneA">
            <div class="zoneTitle">1º número</div>
            <div class="dots" id="dotsA"></div>
          </div>

          <div class="opBadge" id="opBadge">+</div>

          <div class="zone" id="zoneB">
            <div class="zoneTitle">2º número</div>
            <div class="dots" id="dotsB"></div>
          </div>
        </div>

        <div class="stage" id="stage">
          <div class="stageTitle">Resultado (palco)</div>
          <div class="stageInner" id="stageInner"></div>
        </div>

        <div class="question" aria-live="polite">
          <div class="big">
            <span id="n1">?</span>
            <span id="op">+</span>
            <span id="n2">?</span>
            =
            <span style="color:#9ca3af">?</span>
          </div>
        </div>

        <div class="buttons" id="buttons"></div>

        <div id="message" class="msg"></div>

        <div class="controls">
          <button class="btn btn-hint" id="btnHint" type="button">Dica</button>
          <button class="btn btn-next" id="btnNext" type="button">Próxima</button>
        </div>

        <div id="hintText" class="hintText"></div>

        <div class="stats">
          <div class="pill">Acertos: <strong id="hits">0</strong></div>
          <div class="pill">Erros: <strong id="miss">0</strong></div>
          <div class="pill">Total: <strong id="total">0</strong></div>
        </div>
      </div>

      <!-- PERSONAGEM -->
      <div class="card buddy">
        <div id="avatarState" class="avatar neutral" aria-label="Personagem">
          <div class="face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
          </div>
        </div>
        <h2 id="buddyTitle">Vamos jogar! 🙂</h2>
        <p id="buddyText">Escolha um número de 0 a 10.</p>
      </div>
    </div>
  </div>

  <!-- camada de animação -->
  <div id="animLayer"></div>

<script>
  // ===== Estado =====
  let a = 0, b = 0, op = "+";
  let hits = 0, miss = 0;
  let answered = false;
  let hintRunning = false;

  // ===== Elementos =====
  const elN1 = document.getElementById("n1");
  const elN2 = document.getElementById("n2");
  const elOp = document.getElementById("op");
  const elOpBadge = document.getElementById("opBadge");

  const elDotsA = document.getElementById("dotsA");
  const elDotsB = document.getElementById("dotsB");

  const stageInner = document.getElementById("stageInner");

  const elMsg = document.getElementById("message");
  const elHintText = document.getElementById("hintText");

  const elHits = document.getElementById("hits");
  const elMiss = document.getElementById("miss");
  const elTotal = document.getElementById("total");

  const elAvatar = document.getElementById("avatarState");
  const elBuddyTitle = document.getElementById("buddyTitle");
  const elBuddyText = document.getElementById("buddyText");

  const btnReset = document.getElementById("btnReset");
  const btnHint = document.getElementById("btnHint");
  const btnNext = document.getElementById("btnNext");

  const buttonsDiv = document.getElementById("buttons");
  const answerButtons = [];

  const animLayer = document.getElementById("animLayer");

  // ===== Botões 0..10 =====
  for (let i = 0; i <= 10; i++){
    const btn = document.createElement("button");
    btn.textContent = i;
    btn.addEventListener("click", () => checkAnswer(i));
    buttonsDiv.appendChild(btn);
    answerButtons.push(btn);
  }

  // ===== Utils =====
  const wait = (ms) => new Promise(r => setTimeout(r, ms));
  const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

  function setBuddy(state, title, text){
    elAvatar.classList.remove("happy", "sad", "neutral");
    elAvatar.classList.add(state);
    elBuddyTitle.textContent = title;
    elBuddyText.textContent = text;
  }

  function updateStats(){
    elHits.textContent = hits;
    elMiss.textContent = miss;
    elTotal.textContent = hits + miss;
  }

  function setAnswerButtonsEnabled(enabled){
    answerButtons.forEach(b => b.disabled = !enabled);
  }
  function setControlsEnabled(enabled){
    btnHint.disabled = !enabled;
    btnNext.disabled = !enabled;
  }

  function clearStage(){
    stageInner.innerHTML = "";
    animLayer.innerHTML = "";
  }

  function renderDots(container, count, color){
    container.innerHTML = "";
    for (let i = 0; i < count; i++){
      const d = document.createElement("div");
      d.className = "dot" + (color === "red" ? " red" : "");
      container.appendChild(d);
    }
  }

  function correctAnswer(){
    return (op === "+") ? (a + b) : (a - b);
  }

  // ===== Slot do palco em GRUPOS DE 3 =====
  function getStageSlot(index){
    // não “fixa” o tamanho do dot aqui (pega do layout)
    const step = 26;      // distância normal
    const groupGap = 14;  // espaço extra entre grupos de 3
    const padX = 12;
    const padY = 8;

    const innerW = stageInner.clientWidth || 300;
    const perRow = Math.max(3, Math.floor((innerW - padX*2) / step));

    const col = index % perRow;
    const row = Math.floor(index / perRow);

    const groupsBefore = Math.floor(col / 3);

    const x = padX + col * step + groupsBefore * groupGap;
    const y = padY + row * step;

    return { x, y };
  }

  // Cria ghost no overlay exatamente na posição do dot na tela
  function createGhostFromDot(dotEl, isRed){
    const r = dotEl.getBoundingClientRect();
    const size = r.width || 18;
    const half = size / 2;

    const g = document.createElement("div");
    g.className = "ghost" + (isRed ? " red" : "");
    g.style.left = (r.left + half - (size/2)) + "px";
    g.style.top  = (r.top  + half - (size/2)) + "px";
    g.dataset.baseLeft = g.style.left;
    g.dataset.baseTop  = g.style.top;
    animLayer.appendChild(g);
    return g;
  }

  // Move ghost para um slot do palco
  function moveGhostToStageSlot(ghost, slot){
    const stageR = stageInner.getBoundingClientRect();
    const destX = stageR.left + slot.x;
    const destY = stageR.top  + slot.y;

    const baseLeft = parseFloat(ghost.dataset.baseLeft);
    const baseTop  = parseFloat(ghost.dataset.baseTop);

    const dx = destX - baseLeft;
    const dy = destY - baseTop;

    ghost.style.transform = `translate(${dx}px, ${dy}px)`;
  }

  // Cria dot fixo no palco
  function putFixedDot(slot, isRed){
    const d = document.createElement("div");
    d.className = "stageDot" + (isRed ? " red" : "");
    d.style.left = slot.x + "px";
    d.style.top  = slot.y + "px";
    stageInner.appendChild(d);
    return d;
  }

  // Desenha o resultado final (pretinhas) e retorna o array dos elementos
  function drawFinalResultDots(count){
    stageInner.innerHTML = "";
    const dots = [];
    for (let i = 0; i < count; i++){
      dots.push(putFixedDot(getStageSlot(i), false));
    }
    return dots;
  }

  // Animação de contagem: uma bolinha por vez a cada 0,5s
  async function countPulse(dots){
    for (let i = 0; i < dots.length; i++){
      const d = dots[i];
      d.classList.add("pulse");
      await wait(250);
      d.classList.remove("pulse");
      await wait(250);
    }
  }

  function newQuestion(){
    if (hintRunning) return;

    answered = false;
    hintRunning = false;

    elMsg.textContent = "";
    elMsg.className = "msg";
    elHintText.textContent = "";

    setAnswerButtonsEnabled(true);
    setControlsEnabled(true);
    clearStage();

    op = (randInt(0,1) === 0) ? "+" : "-";

    if (op === "+"){
      a = randInt(0, 10);
      b = randInt(0, 10 - a);
    } else {
      a = randInt(0, 10);
      b = randInt(0, a);
    }

    elN1.textContent = a;
    elN2.textContent = b;
    elOp.textContent = op;
    elOpBadge.textContent = op;

    renderDots(elDotsA, a, "black");
    renderDots(elDotsB, b, (op === "-" ? "red" : "black"));

    setBuddy("neutral", "Sua vez! 🙂", "Use a Dica se precisar.");
  }

  function checkAnswer(value){
    if (answered || hintRunning) return;

    const correct = correctAnswer();
    answered = true;
    setAnswerButtonsEnabled(false);

    if (value === correct){
      hits++;
      elMsg.textContent = "Acertou! 🎉";
      elMsg.className = "msg ok";
      setBuddy("happy", "Uhuu! 😄", "Mandou bem! Aperte Próxima.");
    } else {
      miss++;
      elMsg.textContent = `Quase! A resposta é ${correct}.`;
      elMsg.className = "msg bad";
      setBuddy("sad", "Ahh 😢", "Tudo bem! Aperte Próxima.");
    }
    updateStats();
  }

  async function showHint(){
    if (hintRunning) return;
    if (answered){
      elHintText.textContent = "Você já respondeu. Clique em Próxima 🙂";
      return;
    }

    hintRunning = true;
    setControlsEnabled(false);
    setAnswerButtonsEnabled(false);
    clearStage();

    const result = correctAnswer();

    const dotsA = [...elDotsA.querySelectorAll(".dot")];
    const dotsB = [...elDotsB.querySelectorAll(".dot")];

    // “apaga” originais
    dotsA.forEach(d => d.style.opacity = "0.15");
    dotsB.forEach(d => d.style.opacity = "0.15");

    if (op === "+"){
      elHintText.textContent = "Dica: juntando tudo no palco…";

      // ghosts pretos de A e B
      const ghosts = [];
      dotsA.forEach(d => ghosts.push(createGhostFromDot(d, false)));
      dotsB.forEach(d => ghosts.push(createGhostFromDot(d, false)));

      ghosts.forEach((g, i) => {
        const slot = getStageSlot(i);
        setTimeout(() => moveGhostToStageSlot(g, slot), 40 + i*25);
      });

      await wait(40 + ghosts.length*25 + 650);

      // final: resultado em grupos de 3 + contagem
      animLayer.innerHTML = "";
      const finalDots = drawFinalResultDots(result);

      elHintText.textContent = `Resultado: ${a} + ${b} = ${result}`;
      await wait(200);
      await countPulse(finalDots);

    } else {
      // SUBTRAÇÃO com quadro intermediário (pretas + vermelhas)
      elHintText.textContent = "Dica: vermelho mostra o que sai (−)…";

      // 1) pretas (a) vão pro palco
      const ghostsBlack = dotsA.map(d => createGhostFromDot(d, false));
      ghostsBlack.forEach((g, i) => {
        const slot = getStageSlot(i);
        setTimeout(() => moveGhostToStageSlot(g, slot), 40 + i*22);
      });

      await wait(40 + ghostsBlack.length*22 + 650);

      // 2) vermelhas (b) sobrepõem as ÚLTIMAS pretas (slots result..a-1)
      const ghostsRed = dotsB.map(d => createGhostFromDot(d, true));
      ghostsRed.forEach((g, i) => {
        const slotIndex = result + i;       // <- aqui fica igual sua imagem
        const slot = getStageSlot(slotIndex);
        setTimeout(() => moveGhostToStageSlot(g, slot), 60 + i*45);
      });

      await wait(60 + ghostsRed.length*45 + 650);

      // 3) quadro intermediário fixo no palco: pretas que sobram + vermelhas no final
      animLayer.innerHTML = "";
      stageInner.innerHTML = "";

      const fixedRed = [];
      for (let i = 0; i < result; i++){
        putFixedDot(getStageSlot(i), false);
      }
      for (let i = 0; i < b; i++){
        fixedRed.push(putFixedDot(getStageSlot(result + i), true));
      }

      elHintText.textContent = "Veja: preto fica, vermelho sai…";
      await wait(700);

      // 4) some vermelho
      fixedRed.forEach((d, i) => setTimeout(() => d.style.opacity = "0", 40 + i*35));
      await wait(40 + fixedRed.length*35 + 250);

      // 5) final: resultado em grupos de 3 + contagem
      const finalDots = drawFinalResultDots(result);

      elHintText.textContent = `Resultado: ${a} − ${b} = ${result}`;
      await wait(200);
      await countPulse(finalDots);
    }

    hintRunning = false;
    setControlsEnabled(true);
    setAnswerButtonsEnabled(true);
    setBuddy("neutral", "Agora tenta 🙂", "Escolha o número certo!");
  }

  function resetGame(){
    hits = 0; miss = 0;
    updateStats();
    setBuddy("neutral", "Recomeçou 🙂", "Vamos de novo!");
    newQuestion();
  }

  // Eventos
  btnReset.addEventListener("click", resetGame);
  btnNext.addEventListener("click", newQuestion);
  btnHint.addEventListener("click", showHint);

  // Start
  resetGame();
</script>
</body>
